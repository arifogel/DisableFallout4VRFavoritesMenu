# ========================================================================
# Pre-Commit Global Project Hooks
# ========================================================================

# Global exclude pattern (Regex) to skip IDE metadata workspaces.
# Note: The .git/ folder is automatically bypassed by the pre-commit framework.
exclude: '^(\.idea|\.vs)/'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # frozen: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.(yaml|yml|xml|md)$
      - id: end-of-file-fixer
        exclude: \.(yaml|yml|xml|md)$
      - id: check-yaml
      - id: check-added-large-files
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: f12edd9c7be1c20cfa42420fd0e6df71e42b51ea # frozen: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: Google-Style Markdown Formatter
        types: [markdown]
        args: ["--print-width", "100", "--prose-wrap", "always"]
      - id: prettier
        name: Format yaml, xml
        files: \.(yaml|yml|xml)$
