# ========================================================================
# Pre-Commit Global Project Hooks
# ========================================================================

# Global exclude pattern (Regex) to skip IDE metadata workspaces.
# Note: The .git/ folder is automatically bypassed by the pre-commit framework.
exclude: '^(\.idea|\.vs)/'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        name: Remove Trailing Whitespace
        description: Trims trailing whitespace from all text files.
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: Google-Style Markdown Formatter
        types: [markdown]
        args: ["--print-width", "100", "--prose-wrap", "always"]
