name: Automated Plugin Build & Package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-latest]

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v5

      - name: Configure CMake Workspace
        run: cmake -B build -A x64

      - name: Compile Debug Binary
        run: cmake --build build --config Debug

      - name: Compile Release Binary
        run: cmake --build build --config Release

      - name: Generate 7z Distribution Package
        run: cmake --build build --config Release --target PACKAGE

      - name: Verify Archive Contents & Rename
        shell: pwsh
        run: |
          # 1. Locate the native generic archive generated by CPack
          $oldArchive = Get-Item build/*.7z

          # 2. Formulate a unique filename containing the matrix operating system suffix
          $finalName = "DisableFallout4VRFavoritesMenu-Package-${{ matrix.os }}.7z"
          $archivePath = Join-Path "build" $finalName

          # 3. Physically rename the file on the virtual disk
          Rename-Item -Path $oldArchive.FullName -NewName $finalName

          # 4. Bind the validation test track to the newly renamed file target
          $archive = Get-Item $archivePath
          Write-Host "Inspecting generated package: $($archive.Name)"

          # Use the pre-installed 7z CLI to list all file entries in the archive
          $archiveContents = & "7z" l $archive.FullName

          # Enforce the exact structural path mapping (F4SE/Plugins/) inside the archive
          $hasDll = $archiveContents | Select-String -Pattern "F4SE[/\\]Plugins[/\\]DisableFallout4VRFavoritesMenu\.dll"
          $hasPdb = $archiveContents | Select-String -Pattern "F4SE[/\\]Plugins[/\\]DisableFallout4VRFavoritesMenu\.pdb"

          if (-not $hasDll) {
              Write-Error "CI FAILURE: DisableFallout4VRFavoritesMenu.dll was not found at the correct path (F4SE/Plugins/) inside the 7z archive!"
              exit 1
          }
          if (-not $hasPdb) {
              Write-Error "CI FAILURE: DisableFallout4VRFavoritesMenu.pdb was not found at the correct path (F4SE/Plugins/) inside the 7z archive!"
              exit 1
          }

          Write-Host "SUCCESS: Both the production DLL and the PDB symbol maps are verified at their exact structural paths."

      - name: Upload Finished Mod Archive
        uses: actions/upload-artifact@v7
        with:
          # Grabs the uniquely named file. It will upload as a direct, unzipped .7z file
          path: build/*.7z
          if-no-files-found: error
          archive: false